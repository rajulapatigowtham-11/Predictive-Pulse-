<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hypertension Prediction</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">

  <div class="bg-white w-full max-w-2xl p-8 rounded-xl shadow-lg">
    <h1 class="text-2xl font-bold text-center mb-6 text-indigo-600">
      Hypertension Prediction
    </h1>

    <form id="predictForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <select name="gender" class="p-2 border rounded" required>
        <option value="">Gender</option>
        <option value="0">Male</option>
        <option value="1">Female</option>
      </select>

      <input name="age" type="number" placeholder="Age" class="p-2 border rounded" required />

      <select name="family_history" class="p-2 border rounded" required>
        <option value="">Family History</option>
        <option value="0">No</option>
        <option value="1">Yes</option>
      </select>

      <select name="medication" class="p-2 border rounded" required>
        <option value="">Medication</option>
        <option value="0">No</option>
        <option value="1">Yes</option>
      </select>

      <!-- ✅ ADDED -->
      <input name="salt_intake" type="number" placeholder="Salt Intake (grams/day)" class="p-2 border rounded" required />

      <!-- ✅ ADDED -->
      <input name="stress_score" type="number" placeholder="Stress Score (1–10)" class="p-2 border rounded" required />

      <!-- ✅ ADDED -->
      <input name="bmi" type="number" step="0.1" placeholder="BMI" class="p-2 border rounded" required />

      <input name="systolic" type="number" placeholder="Systolic BP" class="p-2 border rounded" required />

      <input name="diastolic" type="number" placeholder="Diastolic BP" class="p-2 border rounded" required />

      <button
        type="submit"
        class="md:col-span-2 bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 font-semibold">
        Predict
      </button>
    </form>

    <div id="resultBox" class="mt-6 text-center"></div>
  </div>

  <script>
    const form = document.getElementById("predictForm");
    const resultBox = document.getElementById("resultBox");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        gender: parseInt(form.querySelector('[name="gender"]').value),
        age: parseInt(form.querySelector('[name="age"]').value),
        family_history: parseInt(form.querySelector('[name="family_history"]').value),
        medication: parseInt(form.querySelector('[name="medication"]').value),
        salt_intake: parseFloat(form.querySelector('[name="salt_intake"]').value),
        stress_score: parseFloat(form.querySelector('[name="stress_score"]').value),
        bmi: parseFloat(form.querySelector('[name="bmi"]').value),
        systolic: parseInt(form.querySelector('[name="systolic"]').value),
        diastolic: parseInt(form.querySelector('[name="diastolic"]').value),
      };

      try {
        const res = await fetch("http://127.0.0.1:8000/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        const json = await res.json();

        resultBox.innerHTML = `
          <div class="p-4 rounded bg-green-100 border border-green-400 text-green-800 font-semibold">
            Prediction: ${json.stage}<br>
            Confidence: ${json.confidence}%
          </div>
        `;
      } catch (err) {
        resultBox.innerHTML = `
          <div class="p-4 rounded bg-red-100 border border-red-400 text-red-800 font-semibold">
            API Error – is FastAPI running?
          </div>
        `;
        console.error(err);
      }
    });
  </script>

</body>
</html>
